name: Deploy to GitHub Pages

on:
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into JS
        run: |
          # This step is REQUIRED to swap placeholders for your real keys
          sed -i "s|__MAPBOX_TOKEN__|${{ secrets.MAPBOX_ACCESS_TOKEN }}|g" scripts/script.js
          sed -i "s|__MAPBOX_STYLE__|${{ secrets.MAPBOX_STYLE }}|g" scripts/script.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4