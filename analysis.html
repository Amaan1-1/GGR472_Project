<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis - Urban Heat Islands</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" type="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <div class="header">
            <div class="map-title">Spatial Analysis Tools</div>
            <div id="geocoder" class="search-container"></div>
            <nav class="navbar">
                <a href="index.html" class="nav-link">Home</a>
                <a href="analysis.html" class="nav-link active">Analysis</a>
                <a href="sources.html" class="nav-link">Sources</a>
            </nav>
        </div>

        <div class="content-body">
            <div class="side-panel">
                <div class="sidebar-label">Buffer Analysis</div>
                <div class="analysis-box">
                    <label class="option-label">Buffer Distance (meters)</label>
                    <input type="number" id="buffer-dist" class="buffer" value="500">
                    <button id="btn-buffer" class="layer-btn">Create Buffer</button>
                    <button id="clear-buffer" class="layer-btn btn-clear">Clear</button>
                </div>
 
                <div class="section-spacer"></div>

                <div class="sidebar-label">Distance Measurement</div>
                <div class="analysis-box">
                    <div class="result-display d-flex justify-content-between">
                        <span id="distance-output">0</span>
                        <span class="text-muted">km</span>
                    </div> 
                    <button id="point1" class="layer-btn mb-2">Set Point 1</button>
                    <button id="point2" class="layer-btn">Set Point 2</button>
                    <button id="clear-points" class="layer-btn btn-clear">Clear Points</button>
                </div>

                <button id="export-map" class="export-btn">Export Analysis</button>
            </div>

            <div class="map-box">
                <div id='map' class='map-container'></div>
                <div id="coordinate-display" class="coordinate-box"></div>

                <div class="map-controls">
                    <button id="reset-btn" class="ctrl-btn">Reset Map View</button>
                    <button id="zoom-toggle" class="ctrl-btn">Zoom In/out</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content-body2">
            <div class="bottom-panel">
                <div class="sidebar-label">Toggle Layers</div>
                
                <button id="btn-spaces" class="layer-btn">Green Spaces</button>
                <button id="btn-streets" class="layer-btn">Green Streets</button>
                <button id="btn-roofs" class="layer-btn">Green Roofs</button>
                <button id="btn-heat" class="layer-btn">Heat Vulnerability </button>

                <div class="temp-index-box">
                    <form>
                        <fieldset id="boundaryfieldset">
                            <label class="option-label">Temperature Index</label>
                            <select id="intensity-filter">
                                <option value="all">All Intensities</option>
                                <option value="high">High Intensity</option>
                                <option value="moderate-high">Moderate-High Intensity</option>
                                <option value="moderate">Moderate Intensity</option>
                                <option value="low-moderate">Low-Moderate Intensity</option>
                                <option value="low">Low Intensity</option>
                            </select>
                        </fieldset>
                    </form>
                </div>
            </div>
        </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <script src="./scripts/config.js"></script>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/functions.js"></script>
</body>
</html>
