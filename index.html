<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Interface</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" type="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <div class="header">
            <div class="map-title">Mapping Heat Vulnerability & Green Infrastructure in Toronto</div>
            <div id="geocoder" class="search-container"></div>
            <nav class="navbar">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="analysis.html" class="nav-link">Analysis</a>
                <a href="source.html" class="nav-link">Source Information</a>
            </nav>
        </div>

        <div class="content-body">
            <div class="side-panel">
                <div class="sidebar-label">Toggle Layers</div>
                
                <button id="btn-spaces" class="layer-btn">Green Spaces</button>
                <button id="btn-streets" class="layer-btn">Green Streets</button>
                <button id="btn-roofs" class="layer-btn">Green Roofs</button>
                <button id="btn-heat" class="layer-btn">Heat Vulnerability </button>

                <div class="temp-index-box">
                    <form>
                        <fieldset id="boundaryfieldset" >
                            <label class="option-label" >Temperature Index</label>
                            <select id="intensity-filter">
                                <option value="all">All Intensities</option>
                                <option value="high">High Intensity</option>
                                <option value="moderate-high">Moderate-High Intensity</option>
                                <option value="moderate">Moderate Intensity</option>
                                <option value="low-moderate">Low-Moderate Intensity</option>
                                <option value="low">Low Intensity</option>
                            </select>
                        </fieldset>
                    </form>
                    
                    <div class="temp-list" style="margin-top: 20px;">
                        <div><b>High:</b> > 4.8</div>
                        <div><b>Moderate-High:</b> 1.6 - 4.8</div>
                        <div><b>Moderate:</b> -1.6 - 1.6</div>
                        <div><b>Low-Moderate:</b> -4.8 - -1.6</div>
                        <div><b>Low:</b> < -4.8</div>
                    </div>
                </div>
            </div>

            <div class="map-box">
                <div id='map' class='map-container'></div>
                
                <div id="coordinate-display" class="coordinate-box"></div>

                <div class="map-controls">
                    <button id="reset-btn" class="ctrl-btn">Reset Map View</button>
                </div>
            </div>
        </div>

        <div class="legend-area">
            <div class="legend-title">Legend</div>
            <div class="legend-items">
                <div class="legend-item">
                    <span class="icon-placeholder"><img src="./data/signpost.png" class="legend-icon"></span>
                    <span>Green Streets</span>
                </div>
                <div class="legend-item">
                    <span class="icon-placeholder"><img src="./data/tree.png" class="legend-icon"></span>
                    <span>Green Spaces</span>
                </div>
                <div class="legend-item">
                    <span class="icon-placeholder"><img src="./data/house.png" class="legend-icon"></span>
                    <span>Green Roofs</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/functions.js"></script>
</body>
</html>
